data:
  factor_paths:
    financial: 02因子库/processed_data/factors/financial
    technical: 02因子库/processed_data/factors/technical
  label:
    horizon: 20
    use_open_price: true
  market_data_path: 02因子库/processed_data/market_data
  open_column: open
  price_column: close
model:
  name: lightgbm_rank
  params:
    bagging_fraction: 0.8
    bagging_freq: 5
    boosting_type: gbdt
    early_stopping_rounds: 50
    feature_fraction: 0.7
    lambda_l1: 0.5
    lambda_l2: 1.0
    learning_rate: 0.015
    max_depth: 5
    metric: ndcg
    min_data_in_leaf: 150
    n_estimators: 1500
    ndcg_eval_at:
    - 10
    - 30
    - 50
    num_leaves: 31
    num_threads: 8
    objective: lambdarank
    verbose: -1
  random_state: 42
output:
  experiments_dir: 03模型训练层/experiments
  importance_filename: importance_fold_{fold_id:03d}.csv
  model_filename: model_fold_{fold_id:03d}.pkl
  predictions_filename: predictions.parquet
training:
  log_level: INFO
  save_feature_importance: true
  save_models: true
walk_forward:
  end_date: null
  gap_train_valid: 21
  gap_valid_test: 21
  start_date: '2020-01-01'
  step: 3M
  test_window: 3M
  train_window: 3Y
  valid_window: 6M
